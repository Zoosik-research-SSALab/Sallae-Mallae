spring.application.name=sallaemallae-backend
server.port=8080

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:app_dev}
spring.datasource.username=${DB_USER:app_dev_user}
spring.datasource.password=${DB_PASSWORD:change_me_dev}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# JWT
jwt.secret=${JWT_SECRET:your-256-bit-secret-key-here-must-be-at-least-32-characters-long}
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=1209600000

# Mail (SMTP)
# ============================================================
# [로컬 개발] Gmail SMTP 사용 시:
#   - MAIL_USERNAME: Gmail 주소
#   - MAIL_PASSWORD: Gmail 앱 비밀번호 (https://myaccount.google.com/apppasswords)
#
# [배포 환경] 아래 서비스 중 선택하여 환경변수로 설정:
#   - AWS SES: MAIL_HOST=email-smtp.ap-northeast-2.amazonaws.com
#   - SendGrid: MAIL_HOST=smtp.sendgrid.net, MAIL_USERNAME=apikey
#   - Mailgun: MAIL_HOST=smtp.mailgun.org
# ============================================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul

logging.level.org.hibernate.SQL=info

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
