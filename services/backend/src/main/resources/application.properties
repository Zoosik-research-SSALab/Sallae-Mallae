spring.application.name=sallaemallae-backend
spring.jackson.property-naming-strategy=SNAKE_CASE
server.port=8080
server.forward-headers-strategy=framework

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:app}
spring.datasource.username=${DB_USER:app_user}
spring.datasource.password=${DB_PASSWORD:change_me_app}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# JWT
jwt.secret=${JWT_SECRET:your-256-bit-secret-key-here-must-be-at-least-32-characters-long}
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=1209600000

# Mail (SMTP)
# ============================================================
# [로컬 개발] Gmail SMTP 사용 시:
#   - MAIL_USERNAME: Gmail 주소
#   - MAIL_PASSWORD: Gmail 앱 비밀번호 (https://myaccount.google.com/apppasswords)
#
# [배포 환경] 아래 서비스 중 선택하여 환경변수로 설정:
#   - AWS SES: MAIL_HOST=email-smtp.ap-northeast-2.amazonaws.com
#   - SendGrid: MAIL_HOST=smtp.sendgrid.net, MAIL_USERNAME=apikey
#   - Mailgun: MAIL_HOST=smtp.mailgun.org
# ============================================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# OAuth (Google)
oauth.google.client-id=${OAUTH_GOOGLE_CLIENT_ID:}
oauth.google.client-secret=${OAUTH_GOOGLE_CLIENT_SECRET:}
oauth.google.redirect-uri=${OAUTH_GOOGLE_REDIRECT_URI:}

# OAuth (Naver)
oauth.naver.client-id=${OAUTH_NAVER_CLIENT_ID:}
oauth.naver.client-secret=${OAUTH_NAVER_CLIENT_SECRET:}
oauth.naver.redirect-uri=${OAUTH_NAVER_REDIRECT_URI:}

# OAuth (Kakao)
oauth.kakao.client-id=${OAUTH_KAKAO_CLIENT_ID:}
oauth.kakao.client-secret=${OAUTH_KAKAO_CLIENT_SECRET:}
oauth.kakao.redirect-uri=${OAUTH_KAKAO_REDIRECT_URI:}

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

logging.level.org.hibernate.SQL=info

# 네이버 금융 API
main.naver.kospi-url=https://polling.finance.naver.com/api/realtime/domestic/index/KOSPI
main.naver.kosdaq-url=https://polling.finance.naver.com/api/realtime/domestic/index/KOSDAQ
main.naver.fx-url=https://m.stock.naver.com/front-api/marketIndex/productDetail?category=exchange&reutersCode=FX_USDKRW

# Swagger
springdoc.api-docs.path=/api/api-docs
springdoc.swagger-ui.path=/api/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
