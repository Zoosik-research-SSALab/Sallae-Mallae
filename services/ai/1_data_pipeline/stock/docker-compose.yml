# KOSPI 200 데이터 파이프라인 Docker Compose
#
# 사용법:
#   docker compose up stock-pipeline          # 증분 수집 (기본)
#   docker compose run stock-pipeline python pipeline.py --mode initial  # 초기 수집
#   docker compose up stock-scheduler         # 자동 스케줄러 (매 거래일 16:30)
#   docker compose run stock-pipeline python validators/data_quality.py  # 품질 검증
#   docker compose run stock-pipeline python processors/build_base_features.py  # 피처 생성
#   docker compose run stock-pipeline rclone config                      # rclone 초기 설정
#   docker compose run stock-pipeline python -c "from utils.drive_utils import rclone_sync_down; ..."  # 수동 동기화

services:
  stock-pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stock-pipeline
    env_file:
      - .env
    environment:
      - BASE_PATH=/data
      - RCLONE_REMOTE=${RCLONE_REMOTE:-}
      - RCLONE_AUTO_SYNC=${RCLONE_AUTO_SYNC:-false}
    volumes:
      # 데이터 영속 볼륨
      - stock-data:/data
      # 로컬 Google Drive 마운트 (선택, Windows 경로)
      # - G:/kospi200-project:/data
      # rclone 설정 파일 마운트 (선택)
      - ${RCLONE_CONFIG:-./rclone.conf}:/root/.config/rclone/rclone.conf
    networks:
      - stock-net

  stock-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stock-scheduler
    restart: unless-stopped
    entrypoint: ["python", "scheduler.py"]
    env_file:
      - .env
    environment:
      - BASE_PATH=/data
      - RCLONE_REMOTE=${RCLONE_REMOTE:-}
      - RCLONE_AUTO_SYNC=${RCLONE_AUTO_SYNC:-false}
    volumes:
      - stock-data:/data
      - ${RCLONE_CONFIG:-./rclone.conf}:/root/.config/rclone/rclone.conf
    networks:
      - stock-net

networks:
  stock-net:
    name: stock-net

volumes:
  stock-data:
    name: stock-data
