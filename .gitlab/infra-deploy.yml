stages:
  - deploy

default:
  tags:
    - ec2

variables:
  DEPLOY_INFRA_REF: "infra-common"
  INFRA_TMP_DIR: "$CI_PROJECT_DIR/.deploy-infra"

deploy_base_manual:
  stage: deploy
  when: manual
  allow_failure: false
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev-backend"'
  script:
    - rm -rf "$INFRA_TMP_DIR"
    - mkdir -p "$INFRA_TMP_DIR"
    - git fetch origin "$DEPLOY_INFRA_REF"
    - git archive "origin/$DEPLOY_INFRA_REF" infra | tar -x -C "$INFRA_TMP_DIR"
    - bash "$INFRA_TMP_DIR/infra/scripts/write-env-files.sh" base
    - CHECKOUT_DIR="$CI_PROJECT_DIR" INFRA_TEMPLATE_DIR="$INFRA_TMP_DIR/infra" bash "$INFRA_TMP_DIR/infra/scripts/deploy-base.sh"

deploy_dev_frontend:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev-frontend"'
  script:
