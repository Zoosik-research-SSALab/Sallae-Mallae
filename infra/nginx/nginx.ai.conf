server {
    listen 80;
    server_name _;

    # Resolve Docker service names repeatedly so nginx does not keep a stale
    # container IP after ml-server is recreated during deploys.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;
    set $ml_server_upstream http://ml-server:8000;

    location / {
        proxy_pass $ml_server_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
