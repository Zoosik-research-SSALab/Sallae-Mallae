services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    environment:
      TZ: Asia/Seoul
    ports:
      - "${NGINX_PORT}:80"
    depends_on:
      spring:
        condition: service_healthy
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - ../nginx/nginx.backend.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-net

  spring:
    build:
      context: ../../services/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      TZ: Asia/Seoul
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${APP_DB_NAME}
      DB_USER: ${APP_DB_USER}
      DB_PASSWORD: ${APP_DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS}
      JWT_SECRET: ${JWT_SECRET}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      OAUTH_GOOGLE_CLIENT_ID: ${OAUTH_GOOGLE_CLIENT_ID}
      OAUTH_GOOGLE_CLIENT_SECRET: ${OAUTH_GOOGLE_CLIENT_SECRET}
      OAUTH_GOOGLE_REDIRECT_URI: ${OAUTH_GOOGLE_REDIRECT_URI}
      OAUTH_NAVER_CLIENT_ID: ${OAUTH_NAVER_CLIENT_ID}
      OAUTH_NAVER_CLIENT_SECRET: ${OAUTH_NAVER_CLIENT_SECRET}
      OAUTH_NAVER_REDIRECT_URI: ${OAUTH_NAVER_REDIRECT_URI}
      OAUTH_KAKAO_CLIENT_ID: ${OAUTH_KAKAO_CLIENT_ID}
      OAUTH_KAKAO_CLIENT_SECRET: ${OAUTH_KAKAO_CLIENT_SECRET}
      OAUTH_KAKAO_REDIRECT_URI: ${OAUTH_KAKAO_REDIRECT_URI}
      AI_SERVER_BASE_URL: ${AI_SERVER_BASE_URL:-http://ml-server:8000}
      KIS_MODE: ${KIS_MODE:-paper}
      KIS_APP_KEY: ${KIS_APP_KEY:-}
      KIS_APP_SECRET: ${KIS_APP_SECRET:-}
      KIS_ACCOUNT_NO: ${KIS_ACCOUNT_NO:-}
      KIS_ACCOUNT_PRODUCT_CODE: ${KIS_ACCOUNT_PRODUCT_CODE:-}
      KIS_REFRESH_MARGIN_SECONDS: ${KIS_REFRESH_MARGIN_SECONDS:-120}
      KIS_TIMEOUT_SECONDS: ${KIS_TIMEOUT_SECONDS:-8}
      KIS_RETRY_ATTEMPTS: ${KIS_RETRY_ATTEMPTS:-1}
      KIS_RETRY_BACKOFF_MILLIS: ${KIS_RETRY_BACKOFF_MILLIS:-250}
      KIS_REALTIME_SUBSCRIPTION_TTL_MINUTES: ${KIS_REALTIME_SUBSCRIPTION_TTL_MINUTES:-30}
      KIS_REALTIME_SUBSCRIPTION_ACK_TIMEOUT_SECONDS: ${KIS_REALTIME_SUBSCRIPTION_ACK_TIMEOUT_SECONDS:-7}
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - app-net
      - base-net
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro

networks:
  app-net:
    name: ${APP_NETWORK_NAME}
  base-net:
    external: true
    name: sallae-base-net
