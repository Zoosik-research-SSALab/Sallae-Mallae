services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${NGINX_PORT}:80"
    depends_on:
      ml-server:
        condition: service_started
    volumes:
      - ../nginx/nginx.ai.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-net

  ml-server:
    build:
      context: ../../services/ai/3_ai_server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      AI_DB_URL: postgresql+psycopg2://${APP_DB_USER}:${APP_DB_PASSWORD}@postgres:5432/${APP_DB_NAME}
    expose:
      - "8000"
    networks:
      - app-net
      - base-net

  stock-scheduler:
    build:
      context: ../../services/ai/1_data_pipeline/stock
      dockerfile: Dockerfile
    restart: unless-stopped
    entrypoint: ["python", "scheduler.py"]
    environment:
      APP_ENV: ${SPRING_PROFILE}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${APP_DB_NAME}
      DB_USER: ${APP_DB_USER}
      DB_PASSWORD: ${APP_DB_PASSWORD}
      RCLONE_AUTO_SYNC: "true"
      RCLONE_REMOTE: ${RCLONE_REMOTE:-}
      DART_API_KEY: ${DART_API_KEY:-}
      KRX_USER_ID: ${KRX_USER_ID:-}
      KRX_PASSWORD: ${KRX_PASSWORD:-}
      FRED_API_KEY: ${FRED_API_KEY:-}
    volumes:
      - stock-data:/data
      - ${RCLONE_CONFIG:-/dev/null}:/root/.config/rclone/rclone.conf:ro
    networks:
      - app-net
      - base-net

  news-scheduler:
    build:
      context: ../../services/ai/1_data_pipeline/news
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["python", "scheduler.py"]
    environment:
      AI_DB_URL: postgresql+psycopg2://${APP_DB_USER}:${APP_DB_PASSWORD}@postgres:5432/${APP_DB_NAME}
      GMS_API_URL: ${GMS_API_URL:-}
      GMS_API_KEY: ${GMS_API_KEY:-}
      GMS_MODEL: ${GMS_MODEL:-gemini-2.5-flash-lite}
    volumes:
      - news-output:/app/output
      - news-data:/app/data
    networks:
      - app-net
      - base-net

networks:
  app-net:
    name: ${APP_NETWORK_NAME}
  base-net:
    external: true
    name: sallae-base-net

volumes:
  stock-data:
    name: stock-data
  news-output:
    name: news-output
  news-data:
    name: news-data
