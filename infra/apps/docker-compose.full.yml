services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      spring:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ../nginx/nginx.full.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-net

  spring:
    build:
      context: ../../services/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${APP_DB_NAME}
      DB_USER: ${APP_DB_USER}
      DB_PASSWORD: ${APP_DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS}
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - app-net
      - base-net

  frontend:
    build:
      context: ../../services/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - app-net

  ml-server:
    build:
      context: ../../services/ai/3_ai_server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      AI_DB_URL: postgresql+psycopg2://${APP_DB_USER}:${APP_DB_PASSWORD}@postgres:5432/${APP_DB_NAME}
    expose:
      - "8000"
    networks:
      - app-net
      - base-net

  ml-worker:
    build:
      context: ../../services/ai/1_data_pipeline/stock
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: ${SPRING_PROFILE}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${APP_DB_NAME}
      DB_USER: ${APP_DB_USER}
      DB_PASSWORD: ${APP_DB_PASSWORD}
    networks:
      - app-net
      - base-net

networks:
  app-net:
    name: ${APP_NETWORK_NAME}
  base-net:
    external: true
    name: sallae-base-net
